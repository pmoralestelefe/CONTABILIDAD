<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAC Contabilidad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="logo-empresa" onerror="this.style.display='none'">
            <h1>Contabilidad Portones Córdoba</h1>
        </div>
        <nav>
            <button id="btn-tesoreria" class="nav-btn active" onclick="cambiarPestaña('tesoreria')">Cajas</button>
            <button id="btn-clientes" class="nav-btn" onclick="cambiarPestaña('clientes')">Clientes</button>
            <button id="btn-gastos" class="nav-btn" onclick="cambiarPestaña('gastos')">Gastos</button>
        </nav>
    </header>

    <section id="tesoreria" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card"><h3>Efectivo</h3><p id="caja-efectivo">$0</p></div>
            <div class="stat-card"><h3>Banco</h3><p id="caja-banco">$0</p></div>
            <div class="stat-card"><h3>Tarjetas</h3><p id="caja-tarjetas">$0</p></div>
            <div class="stat-card"><h3>Fondo</h3><p id="caja-fondo">$0</p></div>
        </div>
        <div class="card">
            <h3>Carga Inicial Mes</h3>
            <input type="number" id="h-efectivo" placeholder="Efectivo inicial $">
            <input type="number" id="h-banco" placeholder="Banco inicial $">
            <button onclick="guardarHerencia()" class="btn btn-blue">Cargar Saldos</button>
        </div>
    </section>

    <section id="clientes" class="tab-content">
        <div class="card">
            <h3>Nueva Obra</h3>
            <input type="text" id="cli-nombre" placeholder="Nombre Cliente">
            <input type="number" id="cli-coti" placeholder="Cotización Total $">
            <input type="number" id="cli-pago" placeholder="Entrega Inicial $">
            <select id="cli-metodo">
                <option value="efectivo">Efectivo</option>
                <option value="banco">Banco</option>
                <option value="tarjeta">Tarjeta</option>
            </select>
            <button onclick="crearCliente()" class="btn btn-blue">Registrar Obra</button>
        </div>
        <div id="lista-clientes-container"></div>
    </section>

    <section id="gastos" class="tab-content">
        <div class="card">
            <h3>Retiro / Gasto</h3>
            <select id="gasto-tipo">
                <option value="Pablo">Retiro Pablo</option>
                <option value="Fer">Retiro Fer</option>
                <option value="Gasto">Gasto General</option>
            </select>
            <input type="text" id="gasto-detalle" placeholder="Detalle">
            <input type="number" id="gasto-monto" placeholder="Monto $">
            <select id="gasto-origen">
                <option value="efectivo">Desde Efectivo</option>
                <option value="banco">Desde Banco</option>
                <option value="fondo">Desde Fondo</option>
            </select>
            <button onclick="crearGastoRetiro()" class="btn btn-red">Cargar Gasto</button>
        </div>
        <div class="card">
            <p>Retiros: Pablo: <span id="ret-pablo">$0</span> | Fer: <span id="ret-fer">$0</span></p>
        </div>
        <div class="card">
            <table>
                <tbody id="body-gastos"></tbody>
            </table>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
