<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAC - Administración Contable</title>
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #3b82f6; --green: #22c55e; --red: #ef4444; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Dashboard de totales */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #1e293b; text-align: center; }
        .stat-card h3 { font-size: 12px; color: #94a3b8; margin: 0; text-transform: uppercase; }
        .stat-card p { font-size: 20px; font-weight: bold; margin: 10px 0 0; }
        
        .container { padding: 0 20px; }
        .flex-tables { display: flex; flex-wrap: wrap; gap: 20px; }
        .table-container { flex: 1; min-width: 350px; background: var(--card); padding: 15px; border-radius: 12px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { text-align: left; color: #94a3b8; padding: 10px; border-bottom: 1px solid #1e293b; }
        td { padding: 10px; border-bottom: 1px solid #0f172a; }
        
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--accent); color: #white; width: 100%; margin-top: 10px; }
        
        input { background: #020617; border: 1px solid #334155; color: white; padding: 8px; border-radius: 4px; width: 80%; }
    </style>
</head>
<body>

<div class="stats-grid">
    <div class="stat-card"><h3>Fondo Común</h3><p id="total-fondo" style="color:var(--green)">$0</p></div>
    <div class="stat-card"><h3>Banco / P.Pay</h3><p id="total-banco">$0</p></div>
    <div class="stat-card"><h3>Gastos Mes</h3><p id="total-gastos" style="color:var(--red)">$0</p></div>
    <div class="stat-card"><h3>Ganancia c/u</h3><p id="ganancia-individual" style="color:var(--accent)">$0</p></div>
</div>

<div class="container">
    <div class="flex-tables">
        <div class="table-container">
            <h3>📂 Obras e Ingresos</h3>
            <table id="tabla-obras">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Cotizado</th>
                        <th>Gastos</th>
                        <th>Ganancia</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
            <button class="btn btn-add">+ Nueva Obra</button>
        </div>

        <div class="table-container">
            <h3>💸 Gastos Operativos (Caja)</h3>
            <table id="tabla-gastos">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Concepto</th>
                        <th>Monto</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
            <button class="btn btn-add">+ Registrar Gasto</button>
        </div>
    </div>
</div>

<script>
    // Aquí irá la lógica de cálculo automático
    // Ganancia = Cotizado - Gastos Directos
    // Ganancia Individual = (Suma Ganancias Obras - Gastos Operativos) / 2
</script>

</body>
</html>
