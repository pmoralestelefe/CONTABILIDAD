<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAC - Contabilidad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --blue: #3b82f6; --red: #ef4444; --green: #22c55e;
        }
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding-bottom: 80px;
        }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        header { 
            background: var(--card); padding: 15px; sticky: top; z-index: 100;
            border-bottom: 1px solid #334155;
        }
        .header-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .logo-empresa { height: 45px; width: 45px; border-radius: 8px; object-fit: cover; }
        h1 { margin: 0; font-size: 18px; flex-grow: 1; }
        
        nav { display: flex; gap: 10px; margin-bottom: 10px; }
        .nav-btn { 
            flex: 1; padding: 10px; border: none; border-radius: 8px; 
            background: #334155; color: #94a3b8; font-weight: bold;
        }
        .nav-btn.active { background: var(--blue); color: white; }

        .grid-cajas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .caja { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; }
        .caja h4 { margin: 0 0 5px; font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        .caja span { font-size: 20px; font-weight: bold; }

        .hoja-cliente { 
            background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px;
            border-left: 5px solid var(--blue);
        }
        input, select, button { 
            width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; 
            border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box;
        }
        .btn { border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
        .btn-green { background: var(--green); }

        .tab-content { display: none; }
    </style>
</head>
<body>

    <div id="bloqueo-seguridad" style="position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px;">
        <h2 style="color: white; margin-bottom: 20px; font-size: 20px;">Portones Automáticos Córdoba</h2>
        <input type="password" id="pass-acceso" placeholder="Contraseña de acceso" style="max-width: 280px; text-align: center; border: 2px solid var(--blue); height: 45px;">
        <button onclick="validarAcceso()" class="btn btn-blue" style="max-width: 280px; height: 45px; margin-top: 15px;">ENTRAR</button>
        <p id="error-pass" style="color: var(--red); margin-top: 15px; display: none;">Contraseña incorrecta</p>
    </div>

    <header>
        <div class="header-top">
            <div style="display: flex; flex-direction: column;">
                <h1>Portones Automáticos Córdoba</h1>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                    <input type="month" id="periodo-actual" onchange="cambiarPeriodo()" style="width: auto; height: 30px; font-size: 12px; padding: 0 5px;">
                </div>
            </div>
        </div>
        <nav>
            <button class="nav-btn active" onclick="verTab('principal')">Cajas</button>
            <button class="nav-btn" onclick="verTab('clientes')">Clientes</button>
            <button class="nav-btn" onclick="verTab('gastos')">Gastos</button>
        </nav>
    </header>

    <div class="container">
        
        <div id="tab-principal" class="tab-content" style="display: block;">
            <div class="grid-cajas">
                <div class="caja"><h4>Banco</h4><span id="t-banco">$0</span></div>
                <div class="caja"><h4>Efectivo</h4><span id="t-efectivo">$0</span></div>
                <div class="caja"><h4>Tarjetas</h4><span id="t-tarjetas">$0</span></div>
                <div class="caja"><h4>Fondo</h4><span id="t-fondo">$0</span></div>
                <div class="caja" style="border: 1px solid #444;"><h4>Pablo</h4><span id="t-pablo" style="color: #fbbf24;">$0</span></div>
                <div class="caja" style="border: 1px solid #444;"><h4>Fer</h4><span id="t-fer" style="color: #fbbf24;">$0</span></div>
            </div>

            <div style="background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px;">
                <h4 style="margin:0">Cargar Saldos Heredados</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="h-banco" placeholder="Banco $">
                    <input type="number" id="h-efectivo" placeholder="Efe $">
                    <input type="number" id="h-tarjetas" placeholder="Tarj $">
                    <input type="number" id="h-fondo" placeholder="Fondo $">
                </div>
                <button onclick="cargarTodoHeredado()" class="btn btn-green">Sumar Saldos</button>
            </div>

            <button onclick="exportarPDF()" class="btn" style="background: #64748b;">Generar Reporte PDF</button>
            <button onclick="resetearMes()" class="btn btn-red" style="margin-top: 20px; opacity: 0.6;">Resetear Mes</button>
        </div>

        <div id="tab-clientes" class="tab-content">
            <div style="background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--blue);">
                <h4 style="margin:0">Nueva Hoja de Cliente</h4>
                <input type="text" id="c-nom" placeholder="Nombre del Cliente">
                <input type="number" id="c-coti" placeholder="Cotización Total $">
                <button onclick="crearCliente()" class="btn btn-blue">Crear Hoja</button>
            </div>
            <div id="contenedor-clientes"></div>
        </div>

        <div id="tab-gastos" class="tab-content">
            <div style="background: var(--card); padding: 15px; border-radius: 12px;">
                <h4 style="margin:0">Cargar Retiro o Gasto Gral</h4>
                <select id="g-tipo">
                    <option value="Pablo">Retiro Pablo</option>
                    <option value="Fer">Retiro Fer</option>
                    <option value="General">Gasto General</option>
                </select>
                <input type="number" id="g-mon" placeholder="Monto $">
                <select id="g-ori">
                    <option value="efectivo">Efectivo</option>
                    <option value="banco">Banco</option>
                    <option value="fondo">Fondo</option>
                </select>
                <button onclick="nuevoGastoGral()" class="btn btn-red">Cargar Gasto</button>
            </div>
        </div>

    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
