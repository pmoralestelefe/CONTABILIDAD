<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>PAC Contabilidad Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header>
        <div class="header-top">
            <img src="icono.png" class="logo-empresa" onerror="this.style.display='none'">
            <div style="display: flex; flex-direction: column;">
                <h1>Contabilidad Portones Automáticos Córdoba</h1>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                    <label style="font-size: 12px; color: #94a3b8;">Período:</label>
                    <input type="month" id="periodo-actual" onchange="cambiarPeriodo()" style="width: auto; margin: 0; padding: 2px 5px; height: 25px; font-size: 12px;">
                </div>
            </div>
        </div>
        <nav>
            <button class="nav-btn active" onclick="verTab('principal')">Inicio</button>
            <button class="nav-btn" onclick="verTab('clientes')">Clientes</button>
            <button class="nav-btn" onclick="verTab('gastos')">Gastos</button>
        </nav>
    </header>

    <div class="container">
        <section id="tab-principal" class="tab-content">
            <div class="grid-totales">
                <div class="card-total"><h3>Banco</h3><p id="t-banco">$0</p></div>
                <div class="card-total"><h3>Efectivo</h3><p id="t-efectivo">$0</p></div>
                <div class="card-total"><h3>Tarjetas</h3><p id="t-tarjetas">$0</p></div>
                <div class="card-total"><h3>Fondo</h3><p id="t-fondo">$0</p></div>
                <div class="card-total"><h3>Pablo</h3><p id="t-pablo" style="color:var(--yellow)">$0</p></div>
                <div class="card-total"><h3>Fer</h3><p id="t-fer" style="color:var(--yellow)">$0</p></div>
            </div>

            <div class="seccion-form">
                <h3>Saldos Heredados</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="h-banco" placeholder="Banco $">
                    <input type="number" id="h-efectivo" placeholder="Efe $">
                    <input type="number" id="h-tarjetas" placeholder="Tarj $">
                    <input type="number" id="h-fondo" placeholder="Fondo $">
                </div>
                <button onclick="cargarTodoHeredado()" class="btn btn-blue">Sumar Saldos</button>
            </div>

            <div class="seccion-form">
                <h3>Movimientos y Cierre</h3>
                <input type="number" id="trans-monto" placeholder="Monto $">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button onclick="transferirBancoFondo()" class="btn btn-blue" style="flex: 1;">A Fondo</button>
                    <button onclick="acreditarTarjeta()" class="btn btn-blue" style="background-color: #22c55e; flex: 1;">Acreditar Tarj</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="exportarPDF()" class="btn" style="background-color: #6366f1; color: white; flex: 2;">📥 PDF</button>
                    <button onclick="resetearMes()" class="btn btn-red" style="flex: 1;">⚠️ Reset</button>
                </div>
            </div>
        </section>

        <section id="tab-clientes" class="tab-content" style="display:none">
            <div class="seccion-form">
                <h3>Nueva Hoja de Cliente</h3>
                <input type="text" id="c-nom" placeholder="Nombre">
                <input type="text" id="c-tel" placeholder="Teléfono">
                <input type="number" id="c-coti" placeholder="Cotización Total $">
                <input type="number" id="c-heredado" placeholder="Deuda anterior $">
                <button onclick="crearCliente()" class="btn btn-blue">Crear Hoja</button>
            </div>
            <div id="contenedor-clientes"></div>
        </section>

        <section id="tab-gastos" class="tab-content" style="display:none">
            <div class="seccion-form">
                <h3>Cargar Retiro o Gasto Gral</h3>
                <select id="g-tipo">
                    <option value="Pablo">Retiro Pablo</option>
                    <option value="Fer">Retiro Fer</option>
                    <option value="Gasto">Gasto Gral / Publicidad</option>
                </select>
                <input type="text" id="g-det" placeholder="Detalle">
                <input type="number" id="g-mon" placeholder="Monto $">
                <select id="g-ori">
                    <option value="banco">Desde Banco</option>
                    <option value="efectivo">Desde Efectivo</option>
                </select>
                <button onclick="nuevoGastoGral()" class="btn btn-red">Registrar</button>
            </div>
        </section>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
