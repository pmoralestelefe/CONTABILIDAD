<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portones Automáticos Córdoba - Gestión</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bloqueo-seguridad" style="position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: var(--card); padding: 30px; border-radius: 15px; text-align: center; width: 100%; max-width: 350px;">
            <img src="logo.png" style="height: 60px; margin-bottom: 20px; border-radius: 10px;">
            <h2 style="margin: 0 0 20px 0;">Acceso PAC</h2>
            <input type="password" id="pass-acceso" placeholder="Contraseña" style="text-align: center; font-size: 18px;">
            <button onclick="validarAcceso()" class="btn btn-blue" style="width: 100%; margin-top: 10px;">Entrar</button>
            <p id="error-pass" style="color: var(--red); display: none; margin-top: 15px; font-size: 14px;">Contraseña incorrecta</p>
        </div>
    </div>

    <header>
        <div class="header-top">
            <img src="logo.png" class="logo-empresa" alt="PAC Logo">
            <h1>PORTONES AUTOMÁTICOS CÓRDOBA</h1>
        </div>
        <nav>
            <button class="nav-btn active" onclick="verTab('inicio')">RESUMEN</button>
            <button class="nav-btn" onclick="verTab('clientes')">CLIENTES</button>
            <button class="nav-btn" onclick="verTab('gastos')">RETIROS</button>
        </nav>
    </header>

    <div class="container">

        <div id="tab-inicio" class="tab-content">
            <div class="grid-totales">
                <div class="card-total" onclick="verDetalle('banco')"><h3>BANCO</h3><p id="t-banco">$0</p></div>
                <div class="card-total" onclick="verDetalle('efectivo')"><h3>EFECTIVO</h3><p id="t-efectivo">$0</p></div>
                <div class="card-total" style="border: 1px solid var(--blue);" onclick="verDetalle('tarjetas')"><h3>TARJETAS</h3><p id="t-tarjetas">$0</p></div>
                <div class="card-total"><h3>FONDO</h3><p id="t-fondo">$0</p></div>
                <div class="card-total" style="color: var(--red);" onclick="verDetalle('pablo')"><h3>PABLO</h3><p id="t-pablo">$0</p></div>
                <div class="card-total" style="color: var(--red);" onclick="verDetalle('fer')"><h3>FER</h3><p id="t-fer">$0</p></div>
            </div>

            <div class="seccion-form">
                <h3>Control de Periodo</h3>
                <input type="month" id="periodo-actual" onchange="cambiarPeriodo()">
                <button onclick="exportarPDF()" class="btn btn-blue" style="width:100%; background: #059669; margin-bottom: 10px;">Generar Reporte para Contador</button>
                <button onclick="resetMes()" class="btn btn-red" style="width:100%; background: #991b1b;">Resetear Mes (Limpiar Planilla)</button>
            </div>

            <div class="seccion-form" style="border: 1px solid #334155;">
                <h3>Traspasos y Acreditaciones</h3>
                <input type="number" id="trans-monto" placeholder="Monto $">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button onclick="transferirBancoFondo()" class="btn btn-blue" style="font-size: 11px;">Banco a Fondo</button>
                    <button onclick="acreditarTarjeta()" class="btn btn-blue" style="font-size: 11px; background: #8b5cf6;">Acreditar Tarjetas</button>
                </div>
            </div>
        </div>

        <div id="tab-clientes" class="tab-content" style="display:none;">
            <div class="seccion-form" style="border: 1px solid var(--blue);">
                <h4 style="margin:0">Nueva Hoja de Obra</h4>
                <input type="text" id="c-nom" placeholder="Nombre del Cliente">
                <input type="tel" id="c-tel" placeholder="Teléfono del Cliente (Opcional)">
                <input type="number" id="c-coti" placeholder="Cotización Total $">
                <button onclick="crearCliente()" class="btn btn-blue">Crear Hoja</button>
            </div>
            <div id="contenedor-clientes"></div>
        </div>

        <div id="tab-gastos" class="tab-content" style="display:none;">
            <div class="seccion-form">
                <h4 style="margin:0">Cargar Retiro o Gasto Gral</h4>
                <select id="g-tipo">
                    <option value="Pablo">Retiro Pablo</option>
                    <option value="Fer">Retiro Fer</option>
                    <option value="General">Gasto General</option>
                </select>
                <input type="number" id="g-mon" placeholder="Monto $">
                <select id="g-ori">
                    <option value="efectivo">Efectivo</option>
                    <option value="banco">Banco</option>
                    <option value="fondo">Fondo</option>
                </select>
                <button onclick="nuevoGastoGral()" class="btn btn-red">Cargar Movimiento</button>
            </div>
        </div>

        <div id="tab-detalle" class="tab-content" style="display:none;">
            <div class="seccion-form">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 id="titulo-detalle" style="margin:0; text-transform: uppercase;">Detalle</h3>
                    <button onclick="verTab('inicio')" class="btn btn-blue" style="width: auto; padding: 5px 15px;">Volver</button>
                </div>
                <div id="lista-detalle">
                    </div>
            </div>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
