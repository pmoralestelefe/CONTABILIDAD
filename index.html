<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad PAC - Portones Automáticos Córdoba</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    
    <header>
        <div class="header-top">
            <img src="logo.png" alt="Logo PAC" class="logo-empresa">
            <h1>Contabilidad Portones Automáticos Córdoba</h1>
        </div>
        <nav>
            <button id="btn-tesoreria" class="nav-btn active" onclick="cambiarPestaña('tesoreria')">Tesorería</button>
            <button id="btn-clientes" class="nav-btn" onclick="cambiarPestaña('clientes')">Clientes/Obras</button>
            <button id="btn-gastos" class="nav-btn" onclick="cambiarPestaña('gastos')">Gastos Grales</button>
            <button onclick="exportarPDFContador()" class="btn-pdf">Generar PDF Contador</button>
        </nav>
    </header>

    <section id="tesoreria" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card"><h3>Efectivo</h3><p id="caja-efectivo">$0</p></div>
            <div class="stat-card"><h3>Banco</h3><p id="caja-banco">$0</p></div>
            <div class="stat-card"><h3>Tarjetas (A liquidar)</h3><p id="caja-tarjetas">$0</p></div>
            <div class="stat-card"><h3>Fondo Común</h3><p id="caja-fondo">$0</p></div>
        </div>
        
        <div class="card">
            <h3>Movimientos de Caja</h3>
            <div class="flex-btns">
                <button onclick="moverBancoAFondo()" class="btn btn-blue">Mover Banco a Fondo</button>
                <button onclick="acreditarTarjeta()" class="btn btn-yellow">Acreditar Tarjeta en Banco</button>
            </div>
        </div>
    </section>

    <section id="clientes" class="tab-content">
        <div class="card">
            <div class="flex-header">
                <h2>Gestión de Clientes y Obras</h2>
                <button onclick="nuevoCliente()" class="btn btn-blue">+ Nuevo Cliente</button>
            </div>
            <div id="lista-clientes-container">
                </div>
        </div>
    </section>

    <section id="gastos" class="tab-content">
        <div class="card">
            <h3>Retiros de Socios</h3>
            <div class="flex-btns">
                <button onclick="registrarRetiro('Pablo')" class="btn btn-yellow">Retiro Pablo</button>
                <button onclick="registrarRetiro('Fer')" class="btn btn-yellow">Retiro Fer</button>
            </div>
            <div class="info-block">
                <p>Retiro Acumulado Pablo: <strong id="ret-pablo" class="positivo">$0</strong></p>
                <p>Retiro Acumulado Fer: <strong id="ret-fer" class="positivo">$0</strong></p>
            </div>
        </div>

        <div class="card">
            <h3>Gastos Operativos (GNC, Publicidad, etc.)</h3>
            <button onclick="nuevoGastoGral()" class="btn btn-red">+ Registrar Gasto</button>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Fecha</th><th>Detalle</th><th>Monto</th><th></th></tr>
                    </thead>
                    <tbody id="body-gastos-grales"></tbody>
                </table>
            </div>
        </div>
        
        <button onclick="borrarTodo()" class="btn-borrar-todo">Borrar Todos los Datos / Cerrar Mes</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
