<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAC Portones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="logo-empresa" onerror="this.style.display='none'">
            <h1>PAC Contabilidad Córdoba</h1>
        </div>
        <nav>
            <button id="btn-tesoreria" class="nav-btn active" onclick="cambiarPestaña('tesoreria')">Cajas</button>
            <button id="btn-clientes" class="nav-btn" onclick="cambiarPestaña('clientes')">Clientes</button>
            <button id="btn-gastos" class="nav-btn" onclick="cambiarPestaña('gastos')">Gastos</button>
        </nav>
    </header>

    <section id="tesoreria" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card"><h3>Efectivo</h3><p id="caja-efectivo">$0</p></div>
            <div class="stat-card"><h3>Banco</h3><p id="caja-banco">$0</p></div>
            <div class="stat-card"><h3>Tarjetas</h3><p id="caja-tarjetas">$0</p></div>
            <div class="stat-card"><h3>Fondo</h3><p id="caja-fondo">$0</p></div>
        </div>
        <div class="card">
            <h3>Cargar Saldo Inicial (Heredado)</h3>
            <input type="number" id="h-efectivo" placeholder="Efectivo $">
            <input type="number" id="h-banco" placeholder="Banco $">
            <button onclick="cargarHeredado()" class="btn btn-blue">Sumar al Mes</button>
        </div>
    </section>

    <section id="clientes" class="tab-content">
        <div class="card">
            <button onclick="nuevoCliente()" class="btn btn-blue">+ Registrar Obra</button>
        </div>
        <div id="lista-clientes-container"></div>
    </section>

    <section id="gastos" class="tab-content">
        <div class="card">
            <button onclick="nuevoGasto()" class="btn btn-red">+ Cargar Gasto/Retiro</button>
        </div>
        <div class="card">
            <p>Retiros Pablo: <strong id="ret-pablo">$0</strong></p>
            <p>Retiros Fer: <strong id="ret-fer">$0</strong></p>
        </div>
        <div id="tabla-movimientos" style="padding: 15px;"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
